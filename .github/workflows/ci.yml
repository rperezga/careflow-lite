name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGO_TEST_URI: mongodb://localhost:27017/careflow_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  ops:
    name: ops scripts (shell + systemd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The backup scripts are the only code here that runs unattended, at 3am, with nobody
      # watching. They get linted like everything else.
      - name: shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck ops/backup/*.sh
      - name: systemd units are valid
        run: |
          for u in ops/backup/*.service ops/backup/*.timer; do
            systemd-analyze verify "$u" || exit 1
          done
      - name: scripts are executable
        run: |
          for f in ops/backup/*.sh; do
            test -x "$f" || { echo "$f is not executable"; exit 1; }
          done
